# Window 2 CDI monitoring for 2026 drought trigger
#
# Computes CDI from z-scored indicators (ERA5, FAO, SEAS5),
# compares against threshold, sends email via Listmonk.
#
# Same secrets and setup as w1_seas5_monitor.yaml.

name: CDI W2 Monitor (2026)

on:
  # schedule:
  #   # Run April 10 at 06:00 UTC — FAO March dekad 3 and ERA5 March
  #   # data typically available by early April
  #   - cron: "0 6 10 4 *"
  workflow_dispatch:
    inputs:
      year:
        description: "Framework year to evaluate (default: current year)"
        required: false
        type: string
      test:
        description: "Add [test] prefix to email subject"
        required: false
        type: boolean
        default: true
      email_group:
        description: "Distribution list group"
        required: false
        type: choice
        default: core_developer
        options:
          - core_developer
          - developers
          - internal_chd
          - full_list

jobs:
  monitor:
    runs-on: ubuntu-latest
    env:
      DSCI_AZ_DB_PROD_PW: ${{ secrets.DSCI_AZ_DB_PROD_PW }}
      DSCI_AZ_DB_PROD_UID: ${{ secrets.DSCI_AZ_DB_PROD_UID }}
      DSCI_AZ_DB_PROD_HOST: ${{ secrets.DSCI_AZ_DB_PROD_HOST }}
      DSCI_AZ_BLOB_DEV_SAS: ${{ secrets.DSCI_AZ_BLOB_DEV_SAS }}
      DSCI_AZ_BLOB_DEV_SAS_WRITE: ${{ secrets.DSCI_AZ_BLOB_DEV_SAS_WRITE }}
      DSCI_LISTMONK_API_USERNAME: ${{ vars.DSCI_LISTMONK_API_USERNAME }}
      DSCI_LISTMONK_API_KEY: ${{ secrets.DSCI_LISTMONK_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python and install dependencies
        run: uv sync

      - name: Determine year
        id: params
        run: |
          if [ -n "${{ inputs.year }}" ]; then
            echo "year=${{ inputs.year }}" >> "$GITHUB_OUTPUT"
          else
            echo "year=$(date +%Y)" >> "$GITHUB_OUTPUT"
          fi

      - name: Run CDI W2 monitoring
        run: |
          uv run python src/monitoring_2026/w2_monitor_cdi_transactional.py \
            --year ${{ steps.params.outputs.year }} \
            --email-group ${{ inputs.email_group || 'core_developer' }} \
            ${{ inputs.test == true && '--test' || '' }}
