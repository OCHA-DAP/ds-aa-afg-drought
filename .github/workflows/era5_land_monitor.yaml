# Monthly ERA5 Land data download from Google Earth Engine
#
# GEE Service Account Setup:
#   1. Create a service account in Google Cloud Console
#   2. Register it with Earth Engine at signup.earthengine.google.com
#      (or use `earthengine set_project`)
#   3. Download the JSON key
#   4. Add as GitHub secret: GEE_SERVICE_ACCOUNT_KEY
#   5. Add Azure SAS write token as: DSCI_AZ_BLOB_DEV_SAS_WRITE

name: ERA5 Land Monitor

on:
  # schedule:
  #   # Run on the 8th of each month at 06:00 UTC
  #   # ERA5 monthly aggregates are typically available ~7 days after month end
  #   - cron: "0 6 8 * *"
  workflow_dispatch:
    inputs:
      year:
        description: "Year to extract (default: previous month's year)"
        required: false
        type: string
      month:
        description: "Month to extract (default: previous month)"
        required: false
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    env:
      GEE_SERVICE_ACCOUNT_KEY: ${{ secrets.GEE_SERVICE_ACCOUNT_KEY }}
      DSCI_AZ_BLOB_DEV_SAS: ${{ secrets.DSCI_AZ_BLOB_DEV_SAS_WRITE }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python and install dependencies
        run: uv sync

      - name: Determine year and month
        id: date
        run: |
          if [ -n "${{ inputs.year }}" ] && [ -n "${{ inputs.month }}" ]; then
            echo "year=${{ inputs.year }}" >> "$GITHUB_OUTPUT"
            echo "month=${{ inputs.month }}" >> "$GITHUB_OUTPUT"
          else
            # Default to previous month
            PREV_MONTH=$(date -d "last month" +%-m 2>/dev/null || date -v-1m +%-m)
            PREV_YEAR=$(date -d "last month" +%Y 2>/dev/null || date -v-1m +%Y)
            echo "year=$PREV_YEAR" >> "$GITHUB_OUTPUT"
            echo "month=$PREV_MONTH" >> "$GITHUB_OUTPUT"
          fi

      - name: Download ERA5 Land monthly data
        run: |
          uv run python src/trigger_monitoring/download_era5_monthly.py \
            --year ${{ steps.date.outputs.year }} \
            --month ${{ steps.date.outputs.month }}
